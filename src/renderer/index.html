<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨刀</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src *; img-src * data:; font-src *">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="titlebar">
    <div id="titlebar-drag-region">
      <span id="window-title">墨刀 Modao</span>
    </div>
    <div id="window-controls">
      <button id="btn-minimize" title="最小化">─</button>
      <button id="btn-maximize" title="最大化">□</button>
      <button id="btn-close" title="关闭">✕</button>
    </div>
  </div>

  <div id="tab-bar">
    <button id="btn-new-tab" title="新建标签">+</button>
  </div>

  <script src="index.js"></script>
</body>
</html>
